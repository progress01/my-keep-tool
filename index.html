<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防彈筆記更新</title>
    <style>
        :root {
            --keep-yellow: #fbbc04;
            --keep-dark: #202124;
            --google-blue: #4285f4;
            --google-green: #34a853;
            --bg-color: #f0f2f5;
            --tag-purple: #a142f4;
            --setting-gray: #5f6368;
        }

        body {
            font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            display: flex;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
            align-items: flex-start;
        }

        /* 左欄 */
        .editor-panel {
            flex: 60;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            border-top: 6px solid var(--keep-yellow);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* 右欄 */
        .tools-panel {
            flex: 40;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: 20px;
            height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        h2 { margin-top: 0; color: #5f6368; text-align: center; }
        h3 { margin-top: 0; font-size: 1.1rem; color: var(--keep-yellow); }
        
        .section-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--keep-dark);
            border-left: 5px solid var(--keep-yellow);
            padding-left: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .title-resource { border-left-color: var(--google-blue); color: #1967d2; }
        .title-tags { border-left-color: var(--tag-purple); color: var(--tag-purple); }
        .title-settings { border-left-color: var(--setting-gray); color: var(--setting-gray); }

        .chat-bubble {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 8px;
            display: block;
            background: #f1f3f4;
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid #dadce0;
        }

        /* 輸入框 */
        textarea.input-box {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            line-height: 1.5;
            box-sizing: border-box;
            background-color: #fafafa;
            min-height: 60px;
            resize: vertical;
        }
        textarea.input-box:focus { border-color: var(--keep-yellow); background-color: #fff; outline: none; }
        
        textarea.resource-box {
            border-color: #d2e3fc;
            background-color: #f8fbff;
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap; 
            overflow-wrap: anywhere; 
            overflow-x: hidden;
            min-height: 120px;
        }
        textarea.resource-box:focus { border-color: var(--google-blue); background-color: #fff; }

        textarea.tag-box {
            border-color: #e1bee7;
            background-color: #f3e5f5;
            font-weight: bold;
            color: var(--tag-purple);
        }
        textarea.tag-box:focus { border-color: var(--tag-purple); background-color: #fff; }

        .setting-hint-box {
            background-color: #f5f5f5;
            border: 1px dashed #999;
            padding: 15px;
            border-radius: 8px;
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* 按鈕 */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn-load { background-color: var(--keep-yellow); color: #333; }
        .btn-gen { background-color: var(--keep-dark); color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        .btn-tiny {
            background-color: var(--google-blue);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-tiny:hover { background-color: #3367d6; }

        .load-zone { background-color: #2d2d2d; color: #fff; border: 2px dashed #555; }
        .load-zone textarea { background: #1a1a1a; color: #0f0; border: 1px solid #444; width: 100%; padding: 10px; box-sizing: border-box; }
        
        .result-zone { border: 2px solid var(--keep-yellow); background: #fff8e1; }
        textarea#final-result { width: 100%; height: 300px; border: none; background: transparent; resize: vertical; font-family: monospace; }

        .section-wrapper { margin-bottom: 25px; }

        @media (max-width: 900px) {
            .dashboard { flex-direction: column; padding: 10px; gap: 20px; }
            .editor-panel, .tools-panel { width: 100%; padding: 20px; box-sizing: border-box; }
            .tools-panel { position: static; height: auto; order: 2; }
            .editor-panel { order: 1; }
        }
    </style>
</head>
<body>

<div class="dashboard">

    <div class="editor-panel">
        <h2>📝 防彈筆記 </h2>
        
        <div class="section-wrapper">
            <div class="section-title"> 狀態更新 </div>
            <textarea id="status" class="input-box" placeholder="Ex: 9月資料已完成，正在補跑 10月..."></textarea>
        </div>

        <div class="section-wrapper">
            <div class="section-title title-resource">
                📚 專案資源庫 (Links)
                <button class="btn-tiny" onclick="formatLinks()">✨ 整理連結 (智慧斷行)</button>
            </div>
            <textarea id="resources" class="input-box resource-box" placeholder="貼上混亂的網址後，按上面的「整理」按鈕！"></textarea>
        </div>

        <div class="section-wrapper">
            <div class="section-title">📝 備註 / 防雷</div>
            <textarea id="memo" class="input-box"></textarea>
        </div>

        <div class="section-wrapper">
            <div class="section-title">🛡️ 目標與風險</div>
            <textarea id="goal_risk" class="input-box" placeholder="第一行寫目標&#10;第二行寫風險"></textarea>
        </div>

        <hr style="border:0; border-top:1px dashed #ddd; margin:30px 0;">

        <div class="section-wrapper">
            <div class="section-title">A. 暖身準備 (Ready)</div>
            <textarea id="qa_a" class="input-box"></textarea>
        </div>
        <div class="section-wrapper">
            <div class="section-title">B. 核心任務 (Main)</div>
            <textarea id="qa_b" class="input-box"></textarea>
        </div>
        <div class="section-wrapper">
            <div class="section-title">C. 成果交付 (Delivery)</div>
            <textarea id="qa_c" class="input-box"></textarea>
        </div>
        <div class="section-wrapper">
            <div class="section-title">D. 經驗存檔 (Review)</div>
            <textarea id="qa_d" class="input-box"></textarea>
        </div>

        <hr style="border:0; border-top:1px dashed #ddd; margin:30px 0;">

        <div class="section-wrapper">
            <div class="section-title title-tags">🏷️ 關鍵字 (Keywords)</div>
            <textarea id="tags" class="input-box tag-box" placeholder="#每月1號 #公司專案"></textarea>
        </div>

        <div class="section-wrapper">
            <div class="section-title title-settings">⚙️ 設定檢查 (Settings)</div>
            <div class="setting-hint-box">
                提醒您：<br>
                1. 🔴紅色(急) / 🟢綠色(穩)<br>
                2. ⏰時間提醒 / 📍地點提醒<br>
                3. 自動附上工具連結
            </div>
        </div>
    </div>

    <div class="tools-panel">
        <div class="card load-zone">
            <h3>📥 讀取舊進度</h3>
            <textarea id="paste-area" placeholder="貼上 Keep 筆記..."></textarea>
            <button class="btn btn-load" onclick="loadFromKeep()">🔄 解析並填入左側</button>
        </div>
        <div class="card result-zone">
            <h3>📤 最終結果</h3>
            <textarea id="final-result" readonly></textarea>
            <button class="btn btn-gen" onclick="copyResult()">✨ 全選並複製</button>
        </div>
    </div>

</div>

<script>
    document.querySelectorAll('textarea').forEach(el => {
        el.addEventListener('input', function() { autoGrow(this); generate(); });
    });
    function autoGrow(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    function triggerResizeAll() { document.querySelectorAll('.input-box').forEach(autoGrow); }

    function formatLinks() {
        const box = document.getElementById('resources');
        let text = box.value;
        text = text.replace(/([^\n])(\[)/g, '$1\n$2');
        text = text.replace(/([^\n])(https?:\/\/)/g, '$1\n$2');
        box.value = text;
        autoGrow(box);
        generate();
    }

    // --- V20 核心：智慧截斷邏輯 ---
    function loadFromKeep() {
        const text = document.getElementById('paste-area').value;
        if (!text.trim()) { alert("請先貼上內容！"); return; }
        
        // 增強版提取函數 (支援排除關鍵字)
        function extract(start, end, excludeList = []) {
            const sIdx = text.indexOf(start);
            if (sIdx === -1) return "";
            
            let content = "";
            let subText = text.substring(sIdx + start.length); // 先抓起點之後的所有內容
            
            // 找出最近的結束點 (可能是 end 標記，也可能是其他欄位的標題)
            let minEndIdx = subText.length;
            
            if (end && subText.indexOf(end) !== -1) {
                minEndIdx = Math.min(minEndIdx, subText.indexOf(end));
            }
            
            // *關鍵修正*：檢查是否撞到其他欄位的標題 (防止吃掉後面的內容)
            if (excludeList.length > 0) {
                excludeList.forEach(marker => {
                    const markerIdx = subText.indexOf(marker);
                    if (markerIdx !== -1) {
                        minEndIdx = Math.min(minEndIdx, markerIdx);
                    }
                });
            }

            return subText.substring(0, minEndIdx).trim();
        }

        function clean(txt) {
            return txt.split('\n').map(l => l.replace(/^[\s\t]*[•-]\s*\[.?\]\s*/, '').trim()).filter(l=>l.length>0).join('\n');
        }

        document.getElementById('status').value = extract("• 狀態/下一步：", "• 資源庫：");
        
        // 資源庫：防止吃到備註
        document.getElementById('resources').value = extract("• 資源庫：", "• 備註/防雷：");
        
        // 備註：*防止吃到目標或分隔線* (這就是你遇到的問題)
        // 我們告訴它：如果看到 "---" OR "🛡️ 任務核心" OR "1. 目標"，都要停下來
        document.getElementById('memo').value = extract("• 備註/防雷：", "---", ["🛡️ 任務核心", "1. 目標"]);
        
        const goal = extract("1. 目標：", "2. 風險：");
        const risk = extract("2. 風險：", "---", ["✅ 執行清單", "A. 暖身準備"]);
        document.getElementById('goal_risk').value = "目標：" + goal + "\n風險：" + risk.replace("⚠️ ", "");

        document.getElementById('qa_a').value = clean(extract("A. 暖身準備", "B. 核心任務"));
        document.getElementById('qa_b').value = clean(extract("B. 核心任務", "C. 成果交付"));
        document.getElementById('qa_c').value = clean(extract("C. 成果交付", "D. 經驗存檔"));
        document.getElementById('qa_d').value = clean(extract("D. 經驗存檔", "🏷️ 關鍵字："));
        
        document.getElementById('tags').value = extract("🏷️ 關鍵字：", "⚙️ 設定檢查");

        triggerResizeAll(); 
        generate(); 
        document.querySelector('.editor-panel').scrollIntoView({ behavior: 'smooth' });
    }

    function generate() {
        const s = document.getElementById('status').value || "（更新中）";
        const res = document.getElementById('resources').value || "（請貼上 SOP 與連結）"; 
        const m = document.getElementById('memo').value || "無";
        const gr = document.getElementById('goal_risk').value || "目標：確保無誤\n風險：時間緊迫";
        const tags = document.getElementById('tags').value || "#通用"; 
        
        const currentUrl = window.location.href;

        function fmt(val, def) {
            if (!val.trim()) return `    • [ ] ${def}`;
            return val.split('\n').map(l => {
                if(!l.trim()) return "";
                return (l.includes("[ ]") || l.includes("[x]")) ? `    • ${l.trim()}` : `    • [ ] ${l.trim()}`;
            }).join('\n');
        }

        let g = "（未設定）", r = "（未設定）";
        const grLines = gr.split('\n');
        if(grLines[0]) g = grLines[0].replace("目標：", "");
        if(grLines[1]) r = grLines[1].replace("風險：", "");

        const t = ` 專案進度
• 狀態/下一步： ${s}
• 資源庫：
${res}
• 備註/防雷： ${m}

---

🛡️ 任務核心
1. 目標： ${g}
2. 風險： ⚠️ ${r}

---

✅ 執行清單 (ABCD)

A. 暖身準備
${fmt(document.getElementById('qa_a').value, "準備到位")}

B. 核心任務
${fmt(document.getElementById('qa_b').value, "核心產出")}

C. 成果交付
${fmt(document.getElementById('qa_c').value, "交付驗收")}

D. 經驗存檔
${fmt(document.getElementById('qa_d').value, "經驗紀錄")}

🏷️ 關鍵字：
${tags}

⚙️ 設定檢查
    • [ ] 🔴紅色(急) / 🟢綠色(穩)
    • [ ] ⏰時間提醒 / 📍地點提醒
    • [ ] 編輯本筆記： ${currentUrl}
`;
        document.getElementById('final-result').value = t;
    }

    function copyResult() {
        generate();
        const res = document.getElementById('final-result');
        res.select();
        res.setSelectionRange(0, 99999);
        document.execCommand("copy");
        
        const btn = document.querySelector('.btn-gen');
        const org = btn.innerText;
        btn.innerText = "✅ 已複製！";
        setTimeout(() => btn.innerText = org, 1500);
    }
    
    generate();
</script>

</body>
</html>
